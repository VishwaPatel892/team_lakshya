services:
  chroma-db:
    image: chromadb/chroma:latest
    container_name: lakshya-chroma-db
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lakshya-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - CHROMA_URL=http://chroma-db:8000
      - NODE_ENV=development
    depends_on:
      - chroma-db
    restart: unless-stopped

volumes:
  chroma-data:
